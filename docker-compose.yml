services:
  postgres:
    image: postgres:latest
    container_name: techbuddy_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      SCHEMA_NAME: ${SCHEMA_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./src/backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  minio:
    image: minio/minio:latest
    container_name: techbuddy_minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: techbuddy_rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shared_network

  app:
    build: 
      context: .
      args:
        - APP_PORT=${APP_PORT}
    container_name: techbuddy_app
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - HOST=0.0.0.0
      - PORT=${APP_PORT}
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_PORT=${DB_PORT}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_API_PORT=${MINIO_API_PORT}
      - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=techbuddy-documents
      - MINIO_SECURE=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_UI_PORT=${RABBITMQ_UI_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - DOCUMENTS_EXCHANGE=${DOCUMENTS_EXCHANGE}
      - RESUME_QUEUE=${RESUME_QUEUE}
      - JD_QUEUE=${JD_QUEUE}
      - RESUME_ROUTING_KEY=${RESUME_ROUTING_KEY}
      - JD_ROUTING_KEY=${JD_ROUTING_KEY}
    volumes:
      - ./logs:/var/log/techbuddy
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shared_network

networks:
  shared_network:
    external: true

volumes:
  rabbitmq_data: {}