<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuddy | Upload Context</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        textarea {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            color: #f8fafc !important;
        }
        textarea:focus {
            border-color: #6366f1 !important;
            outline: none;
        }
        .panel-glow { box-shadow: inset 0 0 50px rgba(0,0,0,0.2); }
        input[type="file"] {
            background: #020617;
            border: 1px dashed #334155;
            color: #94a3b8;
        }
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="h-14 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900 shadow-xl">
        <div class="flex items-center gap-3">
            <span class="text-xl">📄</span>
            <h1 class="font-bold tracking-tight text-slate-200">
                TechBuddy <span class="text-indigo-500 text-xs ml-2">PRO</span>
            </h1>
        </div>
        <span class="text-xs text-slate-500">Context Setup</span>
    </header>

    <!-- MAIN -->
    <main class="flex flex-1 overflow-hidden">

        <!-- LEFT: RESUME -->
        <section class="w-1/2 flex flex-col bg-slate-950 p-12 panel-glow border-r border-slate-800">
            
            <div class="mb-6">
                <h2 class="text-indigo-400 text-xs font-bold tracking-[0.3em] uppercase mb-2">
                    Resume Input
                </h2>
                <h1 class="text-2xl font-bold text-white">Candidate Profile</h1>
            </div>

            <!-- TEXT AREA -->
            <textarea
                id="resumeText"
                placeholder="Paste resume content here..."
                class="flex-grow w-full p-4 rounded-2xl text-sm resize-none focus:ring-1 focus:ring-indigo-500/30"
            ></textarea>

            <!-- FILE UPLOAD -->
            <div class="mt-6">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">
                    Or Upload Resume (PDF, DOC, TXT)
                </label>
                <input
                    type="file"
                    id="resumeFile"
                    accept=".pdf,.doc,.docx,.txt"
                    class="w-full px-4 py-3 rounded-xl cursor-pointer"
                />
            </div>

        </section>

        <!-- RIGHT: JOB DESCRIPTION -->
        <section class="w-1/2 flex flex-col bg-slate-900 p-12">

            <div class="mb-6">
                <h2 class="text-cyan-400 text-xs font-bold tracking-[0.3em] uppercase mb-2">
                    Job Description
                </h2>
                <h1 class="text-2xl font-bold text-white">Role Context</h1>
            </div>

            <!-- TEXT AREA -->
            <textarea
                id="jdText"
                placeholder="Paste job description here..."
                class="flex-grow w-full p-4 rounded-2xl text-sm resize-none focus:ring-1 focus:ring-cyan-500/30"
            ></textarea>

            <!-- FILE UPLOAD -->
            <div class="mt-6">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">
                    Or Upload JD (PDF, DOC, TXT)
                </label>
                <input
                    type="file"
                    id="jdFile"
                    accept=".pdf,.doc,.docx,.txt"
                    class="w-full px-4 py-3 rounded-xl cursor-pointer"
                />
            </div>

            <!-- PROCEED BUTTON -->
            <div class="mt-10 flex justify-end">
                <button
                    id="proceedBtn"
                    class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/30 transition-all active:scale-95"
                >
                    PROCEED →
                </button>
            </div>

        </section>

    </main>

    <!-- SCRIPT -->
    <script>
        // document.getElementById('proceedBtn').onclick = () => {
        //     const resumeText = document.getElementById('resumeText').value;
        //     const jdText = document.getElementById('jdText').value;

        //     // Optional: store in localStorage (simple approach)
        //     localStorage.setItem("resume_text", resumeText);
        //     localStorage.setItem("jd_text", jdText);

            async function uploadFile(endpoint, file) {

                const formData = new FormData();
                formData.append("file", file);

                const response = await fetch(endpoint, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                return await response.json();
            }

            document.getElementById('proceedBtn').onclick = async () => {

                try {

                    const resumeFile =
                        document.getElementById('resumeFile').files[0];

                    const jdFile =
                        document.getElementById('jdFile').files[0];

                    // Upload resume
                    if (resumeFile) {

                        await uploadFile(
                            "/upload/resume",
                            resumeFile
                        );
                    }

                    // Upload JD
                    if (jdFile) {

                        await uploadFile(
                            "/upload/jd",
                            jdFile
                        );
                    }

                    // Redirect after upload
                    window.location.href = "/interview";

                } catch (err) {

                    console.error(err);

                    alert("Upload failed");
                }
            };

        //     // Navigate to interview page
        //     window.location.href = "/interview";
        // };
    </script>

</body>
</html>
