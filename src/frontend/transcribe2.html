<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamScribe | Real-Time AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .interim { color: #94a3b8; font-style: italic; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-3xl space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">StreamScribe</h1>
                <p class="text-slate-400 text-sm">Low-latency Raw PCM Streaming</p>
            </div>
            <div id="statusTag" class="px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-slate-400 border border-slate-700">
                DISCONNECTED
            </div>
        </div>

        <div class="glass rounded-2xl p-6 min-h-[400px] flex flex-col shadow-2xl">
            <div id="scrollArea" class="flex-grow overflow-y-auto space-y-4 pr-2 text-lg leading-relaxed">
                <span id="committedText" class="text-slate-200"></span>
                <span id="interimText" class="interim"></span>
                <div id="emptyState" class="text-slate-500 italic text-center py-20">Click start to begin streaming...</div>
            </div>
            
            <div class="mt-4 h-12 w-full flex items-end gap-1 overflow-hidden" id="viz"></div>
        </div>

        <div class="flex items-center justify-center gap-4">
            <button id="startBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-semibold transition-all flex items-center gap-2">
                <div id="recCircle" class="w-3 h-3 bg-white rounded-full"></div>
                START STREAMING
            </button>
            <button id="stopBtn" class="hidden bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-semibold transition-all">
                STOP
            </button>
            <button id="clearBtn" class="p-3 text-slate-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${window.location.hostname}:8000/ws/transcribe`;
        let ws = null;
        let audioContext = null;
        let processor = null;
        let source = null;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const committedSpan = document.getElementById('committedText');
        const interimSpan = document.getElementById('interimText');
        const statusTag = document.getElementById('statusTag');
        const viz = document.getElementById('viz');

        // Init WebSocket
        function initWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => updateStatus('READY', 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20');
            ws.onclose = () => {
                updateStatus('DISCONNECTED', 'bg-slate-800 text-slate-400 border-slate-700');
                setTimeout(initWS, 2000);
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'transcription') {
                    if (data.is_final) {
                        // Commit interim text to history
                        committedSpan.textContent += " " + interimSpan.textContent;
                        interimSpan.textContent = "";
                    } else {
                        // Update rolling interim text
                        interimSpan.textContent = data.text;
                        document.getElementById('emptyState').classList.add('hidden');
                    }
                    scrollToBottom();
                }
            };
        }

        async function startStreaming() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream);
            
            // Tier 1: Capture Raw PCM via ScriptProcessor
            // Buffer size 4096 (~250ms of audio at 16kHz)
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                // Send raw Float32 array as binary
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(inputData.buffer);
                }
                updateViz(inputData);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);

            toggleUI(true);
        }

        function stopStreaming() {
            if (processor) {
                processor.disconnect();
                source.disconnect();
                audioContext.close();
            }
            toggleUI(false);
        }

        function updateStatus(text, classes) {
            statusTag.textContent = text;
            statusTag.className = `px-3 py-1 rounded-full text-xs font-semibold ${classes}`;
        }

        function toggleUI(isStreaming) {
            startBtn.classList.toggle('hidden', isStreaming);
            stopBtn.classList.toggle('hidden', !isStreaming);
            document.getElementById('recCircle').classList.toggle('pulse', isStreaming);
            updateStatus(isStreaming ? 'STREAMING' : 'READY', isStreaming ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20');
        }

        function scrollToBottom() {
            const area = document.getElementById('scrollArea');
            area.scrollTop = area.scrollHeight;
        }

        function updateViz(data) {
            const step = Math.floor(data.length / 20);
            viz.innerHTML = '';
            for(let i=0; i<20; i++) {
                const bar = document.createElement('div');
                const val = Math.abs(data[i*step]) * 100;
                bar.className = 'flex-grow bg-indigo-500/40 rounded-t-sm transition-all duration-75';
                bar.style.height = `${Math.min(val + 5, 100)}%`;
                viz.appendChild(bar);
            }
        }

        startBtn.onclick = startStreaming;
        stopBtn.onclick = stopStreaming;
        clearBtn.onclick = () => {
            committedSpan.textContent = '';
            interimSpan.textContent = '';
            document.getElementById('emptyState').classList.remove('hidden');
            ws.send(JSON.stringify({command: 'reset'}));
        };

        window.onload = initWS;
    </script>
</body>
</html>
