<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuddy | Dual-Stream Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .interim { color: #64748b; font-style: italic; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .panel-glow { box-shadow: inset 0 0 50px rgba(0,0,0,0.2); }

        /* Styles the actual dropdown list on some browsers */
        #domainSelect option {
            background: #0f172a;
            color: #f8fafc;
            padding: 10px;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-14 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900 shadow-xl z-20">
        <div class="flex items-center gap-3">
            <span class="text-xl">🎤</span>
            <h1 class="font-bold tracking-tight text-slate-200">TechBuddy <span class="text-indigo-500 text-xs ml-2">PRO</span></h1>
        </div>
        <div class="flex gap-4">
            <div id="narratorStatus" class="text-[10px] font-bold px-2 py-1 rounded border border-slate-700 text-slate-500 uppercase">Narrator: Offline</div>
            <div id="transStatus" class="text-[10px] font-bold px-2 py-1 rounded border border-slate-700 text-slate-500 uppercase">Speech: Offline</div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-1/2 flex flex-col bg-slate-950 p-12 panel-glow relative border-r border-slate-800">
            <div class="mb-12">
                <h2 class="text-indigo-400 text-xs font-bold tracking-[0.3em] uppercase mb-8 text-center">Interview Assistant</h2>
                
                <div class="flex items-end justify-center gap-4">
                    
                    <div class="flex flex-col">
                        <label for="domainSelect" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 ml-1">Domain</label>
                        <div class="relative">
                            <select id="domainSelect" class="appearance-none bg-slate-900 text-slate-200 pl-4 pr-10 py-4 rounded-2xl border border-slate-800 focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/20 focus:outline-none font-semibold text-sm cursor-pointer transition-all hover:bg-slate-800 hover:border-slate-700 w-48">
                                <option value="">Loading...</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <button id="nextBtn" class="group relative px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-lg shadow-indigo-900/20 transition-all active:scale-95 overflow-hidden flex items-center gap-2">
                        <span class="relative z-10 flex items-center gap-2">
                            ASK NEXT QUESTION 
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg>
                        </span>
                    </button>

                </div>
            </div>

            <div class="flex-grow flex items-center justify-center">
                <div class="max-w-xl">
                    <p id="narratorDisplay" class="text-3xl font-light leading-relaxed text-slate-300 text-center italic">
                        Click the button above to begin your session...
                    </p>
                </div>
            </div>

            <div class="mt-auto pt-6 flex justify-center gap-6 border-t border-slate-900">
                <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                    <div id="ttsIndicator" class="w-2 h-2 rounded-full bg-slate-800"></div>
                    Auto-Read: <span id="ttsMode">Active</span>
                </div>
            </div>
        </section>

        <section class="w-1/2 flex flex-col bg-slate-900 p-12">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-cyan-400 text-xs font-bold tracking-[0.3em] uppercase">User Response</h2>
                    <p class="text-slate-500 text-xs mt-1">Real-time transcription window</p>
                </div>
                <div class="flex gap-2">
                    <button id="startBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-lg">START MIC</button>
                    <button id="stopBtn" class="hidden bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-lg">STOP MIC</button>
                </div>
            </div>

            <div id="scrollArea" class="flex-grow overflow-y-auto pr-6">
                <div class="text-xl leading-relaxed">
                    <span id="committedText" class="text-slate-200"></span>
                    <span id="interimText" class="interim"></span>
                </div>
            </div>

            <div class="mt-8">
                <div id="viz" class="h-12 w-full flex items-end gap-1 opacity-30"></div>
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-800">
                    <button id="clearBtn" class="text-[10px] font-bold text-slate-600 hover:text-red-400 uppercase tracking-widest transition-colors">Clear History</button>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-700 font-bold uppercase">Streaming PCM</span>
                        <div id="micPulse" class="w-2 h-2 rounded-full bg-slate-800"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- SOCKET CONFIG ---
        const wsTrans = new WebSocket(`ws://${window.location.hostname}:8000/ws/transcribe`);
        const wsNarrator = new WebSocket(`ws://${window.location.hostname}:8000/ws/narrator`);

        // --- DOM ELEMENTS ---
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const nextBtn = document.getElementById('nextBtn');
        const narratorDisplay = document.getElementById('narratorDisplay');
        const committedSpan = document.getElementById('committedText');
        const interimSpan = document.getElementById('interimText');
        const viz = document.getElementById('viz');
        const domainSelect = document.getElementById('domainSelect');

        // --- GLOBAL STATE ---
        let audioContext, processor, source;
        let narratorBuffer = "";
        let selectedDomain = "machine_learning";

        // --- NARRATOR SOCKET LOGIC ---
        wsNarrator.onopen = () => {
            updateStatus('narratorStatus', 'Narrator: Ready', 'text-indigo-400 border-indigo-500/30');
            // Request available domains when connected
            wsNarrator.send(JSON.stringify({ command: "get_domains" }));
        };
        wsNarrator.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            if (data.type === 'domains_list') {
                // Populate dropdown with domains
                domainSelect.innerHTML = '';
                data.domains.forEach((domain, index) => {
                    const option = document.createElement('option');
                    option.value = domain;
                    option.textContent = domain.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    if (index === 0) {
                        option.selected = true;
                        selectedDomain = domain;
                    }
                    domainSelect.appendChild(option);
                });
            }
            
            else if (data.type === 'narrator_stream') {
                const display = document.getElementById('narratorDisplay');
                
                // Reset placeholder on first word
                if (display.textContent.includes("Click the button")) {
                    display.textContent = "";
                }
                
                // Use textContent for better whitespace handling
                display.textContent += data.text;
                narratorBuffer += data.text;

                if (data.is_final || /[.!?]/.test(data.text)) {
                    if (narratorBuffer.trim()) {
                        speakText(narratorBuffer.trim());
                        narratorBuffer = "";
                    }
                }
            }
        };

        domainSelect.onchange = (e) => {
            selectedDomain = e.target.value;
        };

        nextBtn.onclick = () => {
            narratorDisplay.innerText = "...";
            narratorBuffer = "";
            wsNarrator.send(JSON.stringify({ command: "get_next_question", domain: selectedDomain }));
        };

        // --- TRANSCRIPTION SOCKET LOGIC ---
        wsTrans.onopen = () => updateStatus('transStatus', 'Speech: Ready', 'text-emerald-400 border-emerald-500/30');
        wsTrans.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'transcription') {
                if (data.is_final) {
                    committedSpan.textContent += " " + interimSpan.textContent;
                    interimSpan.textContent = "";
                } else {
                    interimSpan.textContent = data.text;
                }
                const area = document.getElementById('scrollArea');
                area.scrollTop = area.scrollHeight;
            }
        };

        // --- AUDIO CAPTURE ---
        async function startMic() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                if (wsTrans.readyState === WebSocket.OPEN) wsTrans.send(inputData.buffer);
                updateViz(inputData);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);
            
            toggleMicUI(true);
        }

        function stopMic() {
            if (processor) {
                processor.disconnect();
                source.disconnect();
                audioContext.close();
            }
            toggleMicUI(false);
        }

        // --- TTS ENGINE ---
        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.onstart = () => {
                document.getElementById('ttsIndicator').classList.add('bg-indigo-500', 'pulse');
                document.getElementById('ttsMode').textContent = "Speaking";
            };
            utterance.onend = () => {
                document.getElementById('ttsIndicator').classList.remove('bg-indigo-500', 'pulse');
                document.getElementById('ttsMode').textContent = "Active";
            };
            window.speechSynthesis.speak(utterance);
        }

        // --- UI HELPERS ---
        function updateStatus(id, text, classes) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `text-[10px] font-bold px-2 py-1 rounded border transition-all ${classes}`;
        }

        function toggleMicUI(isLive) {
            startBtn.classList.toggle('hidden', isLive);
            stopBtn.classList.toggle('hidden', !isLive);
            document.getElementById('micPulse').classList.toggle('bg-emerald-500', isLive);
            document.getElementById('micPulse').classList.toggle('pulse', isLive);
        }

        function updateViz(data) {
            viz.innerHTML = '';
            const step = Math.floor(data.length / 32);
            for(let i=0; i<32; i++) {
                const bar = document.createElement('div');
                const val = Math.abs(data[i*step]) * 100;
                bar.className = 'flex-grow bg-cyan-500/40 rounded-t-sm';
                bar.style.height = `${Math.min(val + 5, 100)}%`;
                viz.appendChild(bar);
            }
        }

        startBtn.onclick = startMic;
        stopBtn.onclick = stopMic;
        clearBtn.onclick = () => {
            committedSpan.textContent = '';
            interimSpan.textContent = '';
            wsTrans.send(JSON.stringify({ command: "reset" }));
        };
    </script>
</body>
</html>
