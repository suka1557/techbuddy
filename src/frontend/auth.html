<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBuddy | Join the Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .panel-glow { box-shadow: inset 0 0 50px rgba(0,0,0,0.3); }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: #f8fafc !important; }
        input:focus { border-color: #6366f1 !important; outline: none; ring: 2px; ring-color: #6366f1; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <section class="w-1/2 flex flex-col justify-center items-center bg-slate-950 p-12 panel-glow border-r border-slate-800">
        <div class="w-full max-w-md">
            <h2 class="text-indigo-400 text-xs font-bold tracking-[0.3em] uppercase mb-2">New User?</h2>
            <h1 class="text-4xl font-bold mb-8 text-white">Create Account</h1>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Email Address</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Password</label>
                    <input type="password" class="w-full px-4 py-3 rounded-xl" placeholder="••••••••">
                </div>
                <button type="button" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-all active:scale-95 mt-4">
                    REGISTER NOW
                </button>
            </form>
        </div>
    </section>

    <section class="w-1/2 flex flex-col justify-center items-center bg-slate-900 p-12">
        <div class="w-full max-w-md">
            <h2 class="text-cyan-400 text-xs font-bold tracking-[0.3em] uppercase mb-2">Existing User</h2>
            <h1 class="text-4xl font-bold mb-8 text-white">Welcome Back</h1>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl" placeholder="tech_user" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition-all active:scale-95 mt-4">
                    SIGN IN
                </button>
            </form>
            <div class="mt-8 pt-8 border-t border-slate-800 flex justify-between items-center">
                <span class="text-xs text-slate-500">TechBuddy PRO v0.1.0</span>
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            // In a real app, you'd validate credentials here.
            // For now, we redirect to the resume and JD upload page:
            window.location.href = "/upload";
        };
    </script>
</body>
</html>
